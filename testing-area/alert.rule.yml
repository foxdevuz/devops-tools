groups:
- name: alert.rules
  rules:
  - alert: InstanceDown
    expr: up == 0
    for: 1m
    labels:
      severity: "critical"
    annotations:
      summary: "Endpoint {{ $labels.instance }} down"
      description: "{{ $labels.instance }} of job {{ $labels.job }} has been down for more than 1 minutes."

  - alert: HostOutOfMemory
    expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 80
    for: 1m
    labels:
      severity: warning
    annotations:
      summary: "Host out of memory {{ $labels.instance }}"
      description: "Node memory is filling up (< 25% left)\n  VALUE = {{ $value }}\n  LABELS: {{ $labels }}"


  - alert: HostOutOfDiskSpace
    expr: (node_filesystem_avail{mountpoint="/"}  * 100) / node_filesystem_size{mountpoint="/"} < 50
    for: 1s
    labels:
      severity: warning
    annotations:
      summary: "Host out of disk space {{ $labels.instance }}"
      description: "Disk is almost full (< 50% left)\n  VALUE = {{ $value }}\n  LABELS: {{ $labels }}"


  - alert: HostHighCpuLoad
    expr: (1 - avg by(instance, job) (irate(node_cpu_seconds_total{mode="idle"}[1m]))) * 100 > 80
    for: 1m
    labels:
      severity: warning
    annotations:
      summary: "Host high CPU load {{ $labels.instance }}"
      description: "CPU load is > 80%\n  VALUE = {{ $value }}\n  LABELS: {{ $labels }}"

  - alert: Port16453Down
    expr: probe_success{instance="your-server-ip:16453"} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "Service on port 16453 is down"
      description: "The TCP probe failed for more than 1 minute."